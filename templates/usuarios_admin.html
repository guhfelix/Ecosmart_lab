{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">Gerenciar Usuários</h2>

<div class="table-responsive">
  <table class="table table-striped table-bordered align-middle">
    <thead class="table-dark">
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Papel</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      {% for u in usuarios %}
      <tr>
        <td>{{ u.nome }}</td>
        <td>{{ u.email }}</td>
        <td>
          <form method="POST" action="{{ url_for('admin.alterar_papel', user_id=u.id) }}" class="d-flex gap-2">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <select name="papel" class="form-select form-select-sm">
              <option value="CIDADAO" {% if u.papel == "CIDADAO" %}selected{% endif %}>CIDADAO</option>
              <option value="GESTOR" {% if u.papel == "GESTOR" %}selected{% endif %}>GESTOR</option>
              <option value="PARCEIRO" {% if u.papel == "PARCEIRO" %}selected{% endif %}>PARCEIRO</option>
              <option value="ADMIN" {% if u.papel == "ADMIN" %}selected{% endif %}>ADMIN</option>
            </select>
            <button type="submit" class="btn btn-sm btn-outline-primary">Salvar</button>
          </form>
        </td>
        <td>
          <span class="badge {% if u.ativo %}bg-success{% else %}bg-secondary{% endif %}">
            {{ "Ativo" if u.ativo else "Desativado" }}
          </span>
        </td>
        <td>
          <form method="POST" action="{{ url_for('admin.alterar_status_usuario', user_id=u.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="btn btn-sm {% if u.ativo %}btn-outline-danger{% else %}btn-outline-success{% endif %}">
              {{ "Desativar" if u.ativo else "Ativar" }}
            </button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<div class="mt-3 d-flex gap-2">
  <a href="{{ url_for('admin.admin_auditoria') }}" class="btn btn-outline-secondary btn-sm">Ver auditoria</a>
  <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary btn-sm">Voltar</a>
</div>
{% endblock %}
