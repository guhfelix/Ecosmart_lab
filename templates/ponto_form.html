{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">{{ acao }} Ponto de Coleta</h2>

<div class="row">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" name="nome" class="form-control" required
                   value="{{ ponto.nome if ponto else '' }}">
          </div>

          <div class="mb-3">
            <label class="form-label">Endereço</label>
            <input type="text" name="endereco" class="form-control" required
                   value="{{ ponto.endereco if ponto else '' }}">
          </div>

          <div class="mb-3">
            <label class="form-label">Tipos aceitos</label>
            <input type="text" name="tipos_aceitos" class="form-control" required
                   value="{{ ponto.tipos_aceitos if ponto else '' }}">
          </div>

          <div class="mb-3">
            <label class="form-label">Horário de funcionamento</label>
            <input type="text" name="horario_funcionamento" class="form-control"
                   value="{{ ponto.horario_funcionamento if ponto else '' }}">
          </div>

          <button type="submit" class="btn btn-success">{{ acao }}</button>
          <a href="{{ url_for('admin.admin_pontos') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
